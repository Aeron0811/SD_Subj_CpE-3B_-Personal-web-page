<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Dennise Roceta</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      color: #e0d6c3;
      overflow: hidden;
      text-align: center;
    }

    /* VIDEO */
    .video-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.45) contrast(1.2);
    }

    /* NAV TABS */
    .nav {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .nav a {
      padding: 10px 25px;
      border-radius: 25px;
      border: 1px solid #c9b37a;
      color: #c9b37a;
      text-decoration: none;
      font-size: 0.9em;
      letter-spacing: 2px;
      transition: 0.3s ease;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
    }

    .nav a:hover {
      background: linear-gradient(to bottom, #d4af37, #7a5c00);
      color: black;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.7);
    }

    /* CENTER */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* SIGIL */
    .sigil {
      width: 120px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 15px rgba(212,175,55,0.7));
    }

    /* CARD */
    .card {
      background: rgba(0,0,0,0.78);
      padding: 35px;
      border-radius: 15px;
      max-width: 600px;
      box-shadow: 0 0 25px rgba(139,0,0,0.3);
    }

    /* TITLE */
    h1 {
      margin-bottom: 20px;
      background: linear-gradient(to bottom, #f5d27a, #d4af37, #7a5c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .info {
      line-height: 2;
      font-size: 1.1em;
    }

    .highlight {
      color: #d4af37;
    }

    /* SOCIALS */
    .socials {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 1.05em;
    }

    .socials a {
      color: #c9b37a;
      text-decoration: none;
      transition: 0.3s;
    }

    .socials a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(212,175,55,0.8);
    }

  </style>
</head>

<body>

  <!-- VIDEO -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="hotd.mp4" type="video/mp4">
    </video>
  </div>

  <!-- NAV -->
  <div class="nav">
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT</a>
    <a href="album.html">ALBUM</a>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <img src="targaryen-sigil.png" class="sigil" alt="Targaryen Sigil">

    <div class="card">

      <h1>CONTACT ME</h1>

      <div class="info">
        📱 <span class="highlight">0976 409 5520</span><br>
        📧 <span class="highlight">dennise.roceta@icloud.com</span><br>
        🎓 <span class="highlight">2320686@ub.edu.ph</span>
      </div>

      <!-- SOCIAL LINKS -->
      <div class="socials">
        <div>
          🌐 Facebook: 
          <a href="https://www.facebook.com/dennroceta" target="_blank">
            Dennise Roceta
          </a>
        </div>

        <div>
          📸 Instagram: 
          <a href="https://www.instagram.com/dennroceta" target="_blank">
            dennroceta
          </a>
        </div>
      </div>

      <p style="margin-top:20px;">
        Send ravens, messages, or calls for alliances or collaboration.
      </p>

    </div>

  </div>

</body>
</html>
