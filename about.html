<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About - Dennise Roceta</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      color: #e0d6c3;
      overflow: hidden;
    }

    /* VIDEO */
    .video-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.45) contrast(1.2);
    }

    /* NAV (same as contact) */
    .nav {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 10;
    }

    .nav a {
      padding: 10px 25px;
      border-radius: 25px;
      border: 1px solid #c9b37a;
      color: #c9b37a;
      text-decoration: none;
      font-size: 0.9em;
      letter-spacing: 2px;
      transition: 0.3s ease;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
    }

    .nav a:hover {
      background: linear-gradient(to bottom, #d4af37, #7a5c00);
      color: black;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.7);
    }

    /* LAYOUT */
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      padding: 0 40px;
    }

    /* LEFT SIDE (CARD) */
    .card {
      background: rgba(0,0,0,0.78);
      padding: 35px;
      border-radius: 15px;
      max-width: 600px;
      box-shadow: 0 0 25px rgba(139,0,0,0.3);
    }

    /* RIGHT IMAGE */
    .about-img {
      width: 420px;
      filter: 
        drop-shadow(0 0 15px rgba(0,0,0,0.9))
        drop-shadow(0 0 10px rgba(212,175,55,0.4));
    }

    /* SIGIL */
    .sigil {
      width: 100px;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      filter: drop-shadow(0 0 15px rgba(212,175,55,0.7));
    }

    /* TITLE */
    h1 {
      text-align: center;
      margin-bottom: 20px;

      background: linear-gradient(
        to bottom,
        #f5d27a,
        #d4af37,
        #7a5c00
      );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .label {
      color: #d4af37;
      font-weight: bold;
    }

    .text {
      color: #e0d6c3;
      line-height: 1.8;
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <a href="index.html">HOME</a>
    <a href="album.html">ALBUM</a>
    <a href="contact.html">CONTACT</a>
  </div>

  <!-- VIDEO -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="hotd.mp4" type="video/mp4">
    </video>
  </div>

  <!-- CONTENT -->
  <div class="container">

    <!-- LEFT CARD -->
    <div class="card">

      <img src="targaryen-sigil.png" class="sigil" alt="Sigil">

      <h1>ABOUT</h1>

      <p class="text">
        <span class="label">Full Name:</span> DENNISE FATIMA SILVA ROCETA<br>
        <span class="label">Nickname:</span> DENN<br><br>

        <span class="label">Birthday:</span> March 14, 2005<br>
        <span class="label">Favorite Color:</span> Pink<br>
        <span class="label">Favorite Food:</span> Tinola<br><br>

        <span class="label">Course:</span> Bachelor of Science in Computer Engineering<br>
        <span class="label">School:</span> University of Batangas Lipa<br><br>

        <span class="label">Interests:</span> Gaming, Reading, Watching TV Shows and Anime
      </p>

    </div>

    <!-- RIGHT IMAGE -->
    <img src="denn-about.png" class="about-img" alt="Dennise About Image">

  </div>

</body>
</html>
